<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment 1</title>
  <script src="jspsych/jspsych.js"></script>
  <script src="jspsych/plugin-preload.js"></script>
  <script src="jspsych/plugin-survey-html-form.js"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>
  <script src="jspsych/plugin-image-button-response.js"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>
  <link rel="stylesheet" href="jspsych/jspsych.css" />
  <style>
    :root {
      color: #202124;
      background: #f7f7f4;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #f7f7f4;
    }

    .jspsych-display-element {
      background: #f7f7f4;
    }

    .jspsych-content {
      max-width: min(1040px, calc(100vw - 32px));
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .slide-image,
    .consent-image,
    #jspsych-image-button-response-stimulus {
      width: min(960px, 100%);
      height: auto;
      box-shadow: 0 2px 18px rgba(0, 0, 0, 0.08);
      background: white;
    }

    .consent-image {
      width: min(820px, 100%);
    }

    .jspsych-btn {
      min-width: 148px;
      min-height: 52px;
      margin: 8px 10px;
      border: 1px solid #b8b8b8;
      border-radius: 6px;
      background: white;
      color: #202124;
      font-size: 20px;
      cursor: pointer;
    }

    .jspsych-btn:hover {
      border-color: #686868;
      background: #f1f1ef;
    }

    .choice-blue,
    .choice-basic {
      border-color: #2f62b3;
    }

    .choice-red,
    .choice-subordinate {
      border-color: #b93a32;
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid #686868;
      border-radius: 6px;
      background: white;
      color: #202124;
      text-decoration: none;
      font-size: 18px;
    }

    .id-entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      line-height: 1.4;
    }

    .id-entry input {
      width: min(420px, 80vw);
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid #9c9c9c;
      border-radius: 6px;
      font-size: 18px;
      text-align: center;
    }

    .error-message {
      max-width: 760px;
      margin: 64px auto;
      padding: 24px;
      border: 1px solid #d8d2c4;
      border-radius: 6px;
      background: white;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <script src="experiment.js"></script>
</body>
</html>
